<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, shrink-to-fit=no">
    <meta property="og:title" content="Pico Environment Archive Unofficial Backup">
    <meta property="og:description" content="Pico Environment Archive Unofficial Backup">
    <meta property="og:type" content="website">
    <meta property="og:image" content="/img/icon.png">
    <meta property="og:site_name" content="Pico Environment Archive Unofficial Backup">
    <title>Environments | Pico Environment Archive Unofficial Backup</title>
    <link rel="icon" type="image/png" href="/img/icon.png">
    <link href="css/bootstrap.min_1544224878.css" rel="stylesheet">

    <!-- Additional CSS -->
    <style>
        .theme-grid img {
            background-color: transparent;
            object-fit: cover;
        }
        .card-body img {
            max-width: 100%;
            height: auto;
            display: block;
            background-color: transparent;
        }
        #authorFilter, #idFilter {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 0.375rem 0.75rem;
            border-radius: 0.25rem;
        }
        #authorFilter:focus, #idFilter:focus {
            outline: none;
            box-shadow: 0 0 0 0.25rem rgba(0, 123, 255, 0.25);
        }
        #idFilter::placeholder {
            color: rgba(255, 255, 255, 0.75);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">PicoEnv Unofficial Backup</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="https://github.com/Nyabsi/PicoThemeManager" target="_blank">Pico Theme Manager</a></li>
                    <li class="nav-item"><a class="nav-link" href="https://picoenvironmentarchive.gt.tc/" target="_blank">Original Site</a></li>
                    <li class="nav-item"><a class="nav-link" href="https://mrxiaom.lanzout.com/s/pico-backup" target="_blank">CN mirror</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <!-- Filters -->
        <div class="row justify-content-center mb-3">
            <div class="col-sm-6 col-md-4 col-lg-3 text-center mb-2">
                <label for="authorFilter" class="form-label d-block">Filter by Author:</label>
                <select id="authorFilter" class="form-select btn btn-primary text-white">
                    <option value="all">All Authors</option>
                </select>
            </div>
            <div class="col-sm-6 col-md-4 col-lg-3 text-center mb-2">
                <label for="idFilter" class="form-label d-block">Filter by ID:</label>
                <input id="idFilter" class="form-control btn btn-primary text-white" type="number" min="1" placeholder="All environments">
            </div>
        </div>

        <div class="theme-grid row justify-content-center" id="themeGrid"></div>
        
        <!-- Pagination Controls -->
        <div class="text-center mt-3">
            <button class="btn btn-primary" id="prevPageBtn" style="display: none;">Previous Page</button>
            <button class="btn btn-primary" id="nextPageBtn">Next Page</button>
        </div>
    </div>

    <footer class="mt-4 text-center">
        <small>&copy; 2024 Pico Environment Archive | Backup by MrXiaoM at <a href="https://github.com/MrXiaoM/picoenvironmentarchive.gt.tc">Github</a></small>
    </footer>

    <script>
        let currentPage = 1;
        const themesPerPage = 8;
        let allThemes = [];

        function getFilteredThemes() {
            const authorFilter = document.getElementById('authorFilter').value;
            const idFilter = document.getElementById('idFilter').value.trim();

            return allThemes.filter(theme => {
                const matchesAuthor = authorFilter === "all" || theme.author === authorFilter;
                const matchesId = idFilter === '' || String(theme.id) === idFilter;
                return matchesAuthor && matchesId;
            });
        }

        // Load and filter themes
        function loadThemes(page) {
            const themeGrid = document.getElementById('themeGrid');
            themeGrid.innerHTML = '';
            const startIndex = (page - 1) * themesPerPage;
            const filteredThemes = getFilteredThemes();
            const themesToDisplay = filteredThemes.slice(startIndex, startIndex + themesPerPage);

            if (themesToDisplay.length === 0) {
                themeGrid.innerHTML = '<p class="text-muted text-center">No environments found.</p>';
            }

            themesToDisplay.forEach(theme => {
                const themeCard = document.createElement('div');
                themeCard.className = 'col-sm-6 col-md-4 col-lg-3 mb-3';

                themeCard.innerHTML = `
                    <div class="card bg-light">
                        <div class="card-header">${theme.title}</div>
                        <img src="/data/images/${theme.id}.webp" class="img-fluid" alt="${theme.title}" title="${theme.description}" width="960" height="800">
                        <div class="card-footer d-flex justify-content-between">
                            <span class="text-muted">${theme.author}</span>
                            <a class="btn btn-primary btn-sm" href="${theme.downloadUrl}">Download</a>
                        </div>
                    </div>
                `;

                themeGrid.appendChild(themeCard);
            });

            document.getElementById('prevPageBtn').style.display = page > 1 ? 'inline-block' : 'none';
            document.getElementById('nextPageBtn').disabled = startIndex + themesPerPage >= filteredThemes.length;
        }

        function populateAuthorFilter() {
            const authorFilter = document.getElementById('authorFilter');
            const authors = [...new Set(allThemes.map(theme => theme.author))];

            authors.forEach(author => {
                const option = document.createElement('option');
                option.value = author;
                option.textContent = author;
                authorFilter.appendChild(option);
            });

            authorFilter.addEventListener('change', () => {
                currentPage = 1;
                loadThemes(currentPage);
            });
        }

        function setupidFilter() {
            const idFilter = document.getElementById('idFilter');

            idFilter.addEventListener('input', () => {
                currentPage = 1;
                loadThemes(currentPage);
            });
        }

        fetch('data/themes.json')
            .then(response => response.json())
            .then(themes => {
                allThemes = themes;
                populateAuthorFilter();
                setupidFilter();
                loadThemes(currentPage);
            })
            .catch(error => console.error('Error loading themes:', error));

        document.getElementById('nextPageBtn').addEventListener('click', () => {
            currentPage++;
            loadThemes(currentPage);
        });

        document.getElementById('prevPageBtn').addEventListener('click', () => {
            currentPage--;
            loadThemes(currentPage);
        });
    </script>

    <script src="js/jquery.min_1500644593.js"></script>
    <script src="js/bootstrap.min_1500644593.js"></script>
</body>
</html>
